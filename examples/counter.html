<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spirit – Counter Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #f0f4f8; color: #1a202c;
    }
    .card {
      background: #fff; border-radius: 12px; padding: 2.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.08); text-align: center;
      min-width: 320px;
    }
    h1 { font-size: 1.25rem; margin-bottom: 1.5rem; color: #4a5568; }
    .count { font-size: 4rem; font-weight: 700; margin: 1rem 0; color: #2d3748; }
    .buttons { display: flex; gap: .75rem; justify-content: center; margin-top: 1.5rem; }
    button {
      padding: .6rem 1.4rem; font-size: 1rem; border: none; border-radius: 8px;
      cursor: pointer; font-weight: 600; transition: background .15s;
    }
    .btn-primary { background: #4299e1; color: #fff; }
    .btn-primary:hover { background: #3182ce; }
    .btn-danger  { background: #fc8181; color: #fff; }
    .btn-danger:hover  { background: #f56565; }
    .btn-secondary { background: #e2e8f0; color: #4a5568; }
    .btn-secondary:hover { background: #cbd5e0; }
    .state-badge {
      display: inline-block; margin-top: 1rem; padding: .3rem .8rem;
      border-radius: 999px; font-size: .8rem; font-weight: 600;
      background: #c6f6d5; color: #276749;
    }
    .state-badge.stopped { background: #fed7d7; color: #9b2c2c; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Spirit Counter</h1>

    <!-- data-model binding: automatically reflects context.count -->
    <div class="count" data-model="count"></div>

    <div class="buttons">
      <button class="btn-danger"    onclick="app.send('DEC')">− 1</button>
      <button class="btn-primary"   onclick="app.send('INC')">+ 1</button>
      <button class="btn-secondary" onclick="app.send('RESET')">Reset</button>
    </div>

    <div class="buttons">
      <button class="btn-secondary" onclick="app.send('TOGGLE')">
        Pause / Resume
      </button>
    </div>

    <div class="state-badge" id="badge">active</div>
  </div>

  <script type="module">
    import { createAppState } from '../src/spirit.js'

    const app = createAppState({
      id: 'counter',
      initial: 'active',
      context: { count: 0 },
      states: {
        active: {
          on: {
            INC:   { actions: (ctx) => { ctx.count++ } },
            DEC:   { actions: (ctx) => { ctx.count-- } },
            RESET: { actions: (ctx) => { ctx.count = 0 } },
            TOGGLE: 'paused',
          },
        },
        paused: {
          on: {
            TOGGLE: 'active',
          },
        },
      },
    })

    // Custom subscription: update the badge
    app.subscribe((state) => {
      const badge = document.getElementById('badge')
      badge.textContent = state.value
      badge.className = 'state-badge' + (state.value === 'paused' ? ' stopped' : '')

      // Disable +/- buttons when paused
      document.querySelectorAll('.btn-primary, .btn-danger').forEach((btn) => {
        btn.disabled = state.value === 'paused'
        btn.style.opacity = state.value === 'paused' ? '0.4' : '1'
      })
    })

    app.start()

    // Expose for onclick handlers
    window.app = app
  </script>
</body>
</html>
